<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Hunt Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="app.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="top-bar">
      <div>
        <p class="eyebrow">SEEK Monitor</p>
        <h1>Job Hunt Console</h1>
      </div>
      <div class="run-strip" aria-live="polite">
        <div>
          <span>Status</span>
          <strong id="run-status">Starting</strong>
        </div>
        <div>
          <span>Cycle</span>
          <strong id="cycle-output">10s</strong>
        </div>
        <div>
          <span>Matches</span>
          <strong id="match-count-output">0</strong>
        </div>
        <div>
          <span>Last Read</span>
          <strong id="last-read-output">--</strong>
        </div>
      </div>
    </header>

    <section class="query-band" aria-labelledby="query-title">
      <div>
        <p class="eyebrow">Requirements</p>
        <h2 id="query-title">Power BI, data, business and portfolio contract matches</h2>
      </div>
      <div id="requirement-tags" class="tag-row" aria-live="polite"></div>
    </section>

    <div class="workspace-grid">
      <aside class="control-panel" aria-labelledby="settings-title">
        <div class="panel-heading">
          <p class="eyebrow">Search</p>
          <h2 id="settings-title">Settings</h2>
        </div>

        <form id="settings-form" class="settings-form">
          <fieldset class="selector-group">
            <legend>Role Conditions</legend>
            <div id="role-options" class="checkbox-grid"></div>
          </fieldset>

          <fieldset class="selector-group">
            <legend>Contract Conditions</legend>
            <div id="contract-options" class="checkbox-grid"></div>
          </fieldset>

          <label>
            Location
            <input id="location-input" name="location" type="text" autocomplete="off">
          </label>

          <label>
            Source Endpoint
            <input id="source-input" name="sourceEndpoint" type="url" autocomplete="off" placeholder="https://example.com/jobs.json">
          </label>

          <label>
            Refresh Seconds
            <input id="interval-input" name="intervalSeconds" type="number" min="10" max="300" step="5">
          </label>

          <div class="button-row">
            <button class="primary-button" type="submit" id="save-button">
              <span data-lucide="save" aria-hidden="true"></span>
              Save
            </button>
            <button class="ghost-button" type="button" id="refresh-button">
              <span data-lucide="refresh-cw" aria-hidden="true"></span>
              Refresh
            </button>
          </div>
        </form>

        <a id="seek-search-link" class="seek-link" href="https://www.seek.com.au" target="_blank" rel="noreferrer">
          <span data-lucide="external-link" aria-hidden="true"></span>
          Open SEEK search
        </a>
      </aside>

      <section class="results-panel" aria-labelledby="results-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Matches</p>
            <h2 id="results-title">Matched Jobs</h2>
          </div>
          <button class="ghost-button compact" type="button" id="clear-button">
            <span data-lucide="trash-2" aria-hidden="true"></span>
            Clear Seen
          </button>
        </div>
        <div id="job-list" class="job-list" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</body>
</html>
