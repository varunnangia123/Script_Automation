<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASX Price Monitor</title>
  <link rel="stylesheet" href="styles.css?v=20260626-6">
</head>
<body>
  <main class="app-shell">
    <section class="monitor-panel" aria-labelledby="app-title">
      <div class="panel-header">
        <div>
          <p class="eyebrow">ASX Monitor</p>
          <h1 id="app-title">Price Alert</h1>
        </div>
        <div class="status-pill" id="status-pill">Idle</div>
      </div>

      <form id="settings-form" class="settings-grid">
        <label>
          <span>Symbols</span>
          <input id="symbol-input" name="symbol" value="WTC, XRO" autocomplete="off" spellcheck="false">
        </label>

        <label>
          <span>Above</span>
          <input id="threshold-input" name="threshold" type="number" value="74" min="0" step="0.01">
        </label>

        <label>
          <span>Every</span>
          <input id="interval-input" name="interval" type="number" value="10" min="10" step="1">
        </label>

        <div class="actions" aria-label="Monitor controls">
          <button id="start-button" type="submit" title="Start monitoring" aria-label="Start monitoring">
            <span aria-hidden="true">▶</span>
          </button>
          <button id="stop-button" type="button" title="Stop monitoring" aria-label="Stop monitoring" disabled>
            <span aria-hidden="true">■</span>
          </button>
        </div>
      </form>

      <div class="price-strip" aria-live="polite">
        <div>
          <span class="metric-label">Last Prices</span>
          <strong id="price-output">--</strong>
        </div>
        <div>
          <span class="metric-label">Checked</span>
          <strong id="checked-output">--</strong>
        </div>
      </div>

      <div id="alert-banner" class="alert-banner" hidden></div>

      <section class="log-panel" aria-label="Monitor log">
        <div class="log-header">
          <span>Log</span>
          <button id="clear-log-button" type="button" title="Clear log" aria-label="Clear log">×</button>
        </div>
        <ol id="log-output"></ol>
      </section>
    </section>

    <section class="sharepoint-panel" aria-labelledby="sharepoint-title">
        <div class="panel-header">
          <div>
            <p class="eyebrow">SharePoint</p>
            <h2 id="sharepoint-title">List Reader</h2>
          </div>
          <div class="status-pill" id="sharepoint-status">Idle</div>
        </div>

        <form id="sharepoint-form" class="sharepoint-form">
          <label>
            <span>List Link</span>
            <input id="sharepoint-link-input" name="sharepointLink" type="url" autocomplete="off" spellcheck="false">
          </label>

          <button id="sharepoint-load-button" type="submit">Load</button>
        </form>

        <div id="sharepoint-message" class="sharepoint-message" hidden></div>
        <div class="sharepoint-table-wrap">
          <table id="sharepoint-table"></table>
        </div>
    </section>
  </main>

  <script src="app.js?v=20260626-6"></script>
</body>
</html>
