<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASX Stock Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260628-1">
  <script type="module" src="app.js?v=20260628-1"></script>
</head>
<body>
  <main class="dashboard-shell">
    <header class="top-bar">
      <div>
        <p class="eyebrow">ASX Tracker</p>
        <h1>Live Watch Grid</h1>
      </div>
      <div class="run-strip" aria-live="polite">
        <div>
          <span>Status</span>
          <strong id="run-status">Starting</strong>
        </div>
        <div>
          <span>Cycle</span>
          <strong>10s</strong>
        </div>
        <div>
          <span>Last Read</span>
          <strong id="last-read-output">--</strong>
        </div>
      </div>
    </header>

    <div class="dashboard-layout">
      <section class="stock-board" aria-labelledby="stock-grid-title">
        <div class="section-heading">
          <p class="eyebrow">Watchlist</p>
          <h2 id="stock-grid-title">20 Stocks</h2>
        </div>
        <div id="stock-grid" class="stock-grid" aria-live="polite"></div>
      </section>

      <aside class="side-rail">
        <section class="alert-panel" aria-labelledby="alert-title">
          <div class="section-heading compact">
            <p class="eyebrow">Thresholds</p>
            <h2 id="alert-title">Alerts</h2>
          </div>
          <div id="alert-list" class="alert-list" aria-live="polite"></div>
        </section>

        <section class="stream-panel" aria-labelledby="stream-title">
          <div class="section-heading compact">
            <p class="eyebrow">Right Now</p>
            <h2 id="stream-title">Data Stream</h2>
          </div>
          <ol id="stream-log" class="stream-log" aria-live="polite"></ol>
        </section>
      </aside>
    </div>
  </main>
</body>
</html>
